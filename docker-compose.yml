# ================================================================
# DOCKER COMPOSE — 3 MySQL instances (3 chi nhánh ngân hàng)
#
# Mỗi MySQL đại diện cho 1 SITE trong hệ thống phân tán:
#   - mysql-hanoi  (port 3307) → bank_hanoi
#   - mysql-danang (port 3308) → bank_danang
#   - mysql-hcm    (port 3309) → bank_hcm
#
# Chạy:
#   docker compose up -d --build
#
# Dừng:
#   docker compose down
#
# Xóa toàn bộ data:
#   docker compose down -v
# ================================================================

services:
  # ============================================================
  # SITE 1 — HÀ NỘI
  # ============================================================
  mysql-hanoi:
    image: mysql:8
    container_name: mysql-hanoi
    restart: always

    command: --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bank_hanoi
      MYSQL_ROOT_HOST: "%"

    ports:
      - "3307:3306"

    volumes:
      # File SQL khởi tạo database
      - ./docker/init-hanoi.sql:/docker-entrypoint-initdb.d/init.sql

      # Lưu dữ liệu MySQL
      - mysql-hanoi-data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ============================================================
  # SITE 2 — ĐÀ NẴNG
  # ============================================================
  mysql-danang:
    image: mysql:8
    container_name: mysql-danang
    restart: always

    command: --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bank_danang
      MYSQL_ROOT_HOST: "%"

    ports:
      - "3308:3306"

    volumes:
      - ./docker/init-danang.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql-danang-data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ============================================================
  # SITE 3 — TP.HCM
  # ============================================================
  mysql-hcm:
    image: mysql:8
    container_name: mysql-hcm
    restart: always

    command: --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bank_hcm
      MYSQL_ROOT_HOST: "%"

    ports:
      - "3309:3306"

    volumes:
      - ./docker/init-hcm.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql-hcm-data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

# ================================================================
# VOLUMES
# ================================================================
volumes:
  mysql-hanoi-data:
  mysql-danang-data:
  mysql-hcm-data:
